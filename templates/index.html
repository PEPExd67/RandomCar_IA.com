<script>
    async function enviar() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        if (!input.value.trim()) return;

        const text = input.value;
        chatBox.innerHTML += `<div class="msg user">${text}</div>`;
        input.value = '';
        
        // Indicador de carga
        const loadingId = "load-" + Date.now();
        chatBox.innerHTML += `<div class="msg ai" id="${loadingId}"><i>Analizando sistemas...</i></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const res = await fetch('/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({message: text})
            });
            const data = await res.json();
            
            // Reemplazar el indicador de carga con la respuesta real
            document.getElementById(loadingId).innerText = data.response;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (e) {
            document.getElementById(loadingId).innerText = "Error crítico de conexión con el núcleo.";
        }
    }

    document.getElementById('userInput').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') enviar();
    });
</script>
