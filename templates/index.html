<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RandomCar AI | Diagnóstico de Ingeniería</title>
    <style>
        :root {
            --primary-orange: #ff4500; /* Tu color característico */
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --text-main: #f0f0f0;
            --accent-glow: rgba(255, 69, 0, 0.3);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Encabezado Estilo Terminal */
        header {
            background: var(--card-bg);
            border-bottom: 2px solid var(--primary-orange);
            padding: 15px 20px;
            text-align: center;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 3px;
            color: var(--primary-orange);
            text-transform: uppercase;
        }

        /* Área de Chat */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px; /* Efecto de rejilla técnica */
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-message {
            align-self: flex-start;
            background: var(--card-bg);
            border-left: 4px solid var(--primary-orange);
            color: #ffffff;
        }

        .user-message {
            align-self: flex-end;
            background: #2b2b2b;
            border-right: 4px solid #00acee;
            color: #ffffff;
        }

        /* Barra de Entrada */
        #input-area {
            background: #151515;
            padding: 20px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #333;
        }

        input {
            flex: 1;
            background: #000;
            border: 1px solid #444;
            color: white;
            padding: 12px 15px;
            border-radius: 4px;
            outline: none;
            transition: border 0.3s;
        }

        input:focus {
            border-color: var(--primary-orange);
        }

        button {
            background: var(--primary-orange);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px var(--primary-orange);
        }

        /* Scrollbar Personalizado */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0d0d0d; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>SISTEMA CENTRAL | RANDOMCAR AI</h1>
    </header>

    <div id="chat-window">
        <div class="message ai-message">
            <strong>[ESTADO: EN LÍNEA]</strong><br>
            Bienvenido al terminal de diagnóstico. Describe el síntoma o ruido de tu vehículo para iniciar el análisis técnico.
        </div>
    </div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Ej: Chirrido metálico en la rueda delantera derecha..." autocomplete="off">
        <button onclick="enviarMensaje()">ANALIZAR</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');

        async function enviarMensaje() {
            const text = userInput.value.trim();
            if (!text) return;

            // Añadir mensaje del usuario a la pantalla
            agregarMensaje(text, 'user-message');
            userInput.value = '';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                agregarMensaje(data.response, 'ai-message');
            } catch (error) {
                agregarMensaje("ERROR: Fallo de conexión con el servidor de diagnóstico.", 'ai-message');
                console.error("Error de fetch:", error);
            }
        }

        function agregarMensaje(texto, clase) {
            const div = document.createElement('div');
            div.className = `message ${clase}`;
            div.innerText = texto;
            chatWindow.appendChild(div);
            
            // Auto-scroll hacia abajo
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Enviar con la tecla Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enviarMensaje();
        });
    </script>
</body>
</html>
